<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Task Master</h1>
            <p class="subtitle">Your personal task management app</p>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task..." autofocus>
            <button id="addBtn" class="btn-add">➕ Add Task</button>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Active:</span>
                <span class="stat-value" id="activeTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedTasks">0</span>
            </div>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn btn-clear" id="clearBtn">Clear Completed</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div class="empty-state" id="emptyState">
            <p>🎉 No tasks! Time to relax!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
